<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SALA_DO_FUTURO_1.12.2_HACKS</title>
    <style>
        body { background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .terminal { width: 90%; max-width: 500px; background: #000; padding: 25px; border: 2px solid #00ff41; box-shadow: 0 0 30px #00ff4144; border-radius: 8px; }
        .header { border-bottom: 1px solid #00ff41; margin-bottom: 20px; padding-bottom: 10px; font-weight: bold; text-align: center; font-size: 1.1em; color: #00f2ff; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; }
        input, select { width: 100%; background: #111; border: 1px solid #00ff41; color: #00ff41; padding: 8px; box-sizing: border-box; outline: none; }
        
        #progress-container { width: 100%; border: 1px solid #00ff41; height: 20px; display: none; margin: 20px 0; }
        #progress-bar { width: 0%; height: 100%; background-color: #00ff41; }
        
        button { width: 100%; background: transparent; color: #00f2ff; border: 1px solid #00f2ff; padding: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #00f2ff; color: #000; box-shadow: 0 0 20px #00f2ff; }
        
        .result-box { display: none; border: 1px dashed #ff00ff; padding: 15px; margin-top: 20px; text-align: center; color: #ff00ff; }
        .token { font-size: 1.5em; font-weight: bold; letter-spacing: 2px; display: block; margin: 10px 0; color: #fff; text-shadow: 0 0 10px #ff00ff; }
    </style>
</head>
<body>

<div class="terminal" id="main-ui">
    <div class="header">SALA DO FUTURO v1.12.2 [BYPASS_CORE]</div>
    
    <div id="form-login">
        <div class="input-group">
            <label>RA DO ALUNO:</label>
            <input type="text" id="ra" placeholder="000123456789-X/SP">
        </div>
        <div class="input-group">
            <label>SENHA SED:</label>
            <input type="password" id="pass" placeholder="********">
        </div>
        <div class="input-group">
            <label>PLATAFORMA ALVO:</label>
            <select id="plataforma">
                <option value="matific">Matific</option>
                <option value="leiasp">LeiaSP</option>
                <option value="redacao">Redação SP</option>
                <option value="tarefasp">Tarefas SP</option>
                <option value="speak">Speak</option>
                <option value="acao">São Paulo em Ação</option>
            </select>
        </div>
        <button onclick="executarHack()">INJETAR SCRIPT</button>
    </div>

    <div id="progress-container">
        <div style="font-size: 0.7em; margin-bottom: 5px;">INJETANDO EXPLOIT...</div>
        <div id="progress-bar"></div>
    </div>

    <div id="result" class="result-box">
        <div>SEU TOKEN FOI ENVIADO COM SUCESSO!</div>
        <span class="token" id="token-id"></span>
        <div style="font-size: 0.8em;">Envie o pagamento para o <b>Emanuel</b> liberar o código do token e validar as tarefas.</div>
    </div>
</div>

<script>
    function gerarToken() {
        return 'TK-' + Math.random().toString(36).substr(2, 9).toUpperCase();
    }

    function executarHack() {
        const ra = document.getElementById('ra').value;
        if(!ra) { alert("Insira o RA!"); return; }

        document.getElementById('form-login').style.display = 'none';
        document.getElementById('progress-container').style.display = 'block';

        let width = 0;
        const bar = document.getElementById('progress-bar');
        
        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                finalizar();
            } else {
                width += Math.random() * 3;
                if (width > 100) width = 100;
                bar.style.width = width + '%';
            }
        }, 100);
    }

    function finalizar() {
        document.getElementById('progress-container').style.display = 'none';
        const result = document.getElementById('result');
        const tokenId = document.getElementById('token-id');
        
        result.style.display = 'block';
        tokenId.innerText = gerarToken();
    }
</script>

</body>
</html>
